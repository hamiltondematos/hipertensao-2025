<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Classificador de PA · Diretriz 2025</title>
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#E05D34">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Classificador PA">
<style>
  :root{
    --bg:#FCF6F1; --card:#FFFFFF; --ink:#2A2320; --muted:#7A6A61;
    --coral:#E05D34; --coralDeep:#BE4527; --peach:#FBEADF; --line:#E7C3B0;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.5;
    -webkit-tap-highlight-color:transparent;
  }
  /* ---- Tela de acesso ---- */
  #gate{
    min-height:100dvh; display:flex; align-items:center; justify-content:center;
    padding:24px calc(24px + env(safe-area-inset-right)) 24px calc(24px + env(safe-area-inset-left));
  }
  .card{
    background:var(--card); width:100%; max-width:420px;
    border:1px solid var(--line); border-radius:20px;
    padding:38px 32px; text-align:center;
    box-shadow:0 18px 50px rgba(42,35,32,.10);
  }
  .lock{
    width:60px; height:60px; margin:0 auto 20px;
    display:flex; align-items:center; justify-content:center;
    background:var(--peach); border-radius:50%;
  }
  .lock svg{width:28px;height:28px;stroke:var(--coralDeep);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .eyebrow{font-size:11.5px;font-weight:700;letter-spacing:2px;color:var(--coral);text-transform:uppercase;margin-bottom:10px}
  h1{font-size:22px;font-weight:700;color:var(--ink);margin-bottom:8px;letter-spacing:-.2px}
  .sub{font-size:14.5px;color:var(--muted);margin:0 auto 22px;max-width:34ch}
  form{display:flex;flex-direction:column;gap:12px}
  input[type=password]{
    font-size:16px; padding:13px 15px; width:100%;
    border:1.5px solid var(--line); border-radius:12px; background:#fff; color:var(--ink);
    text-align:center; letter-spacing:1px;
  }
  input[type=password]:focus{outline:none;border-color:var(--coral)}
  button{
    font-size:16px; font-weight:600; padding:13px 18px; border:none; border-radius:12px;
    background:var(--coral); color:#fff; cursor:pointer; transition:background .15s ease;
  }
  button:hover{background:var(--coralDeep)}
  button:disabled{opacity:.6;cursor:default}
  .remember{display:flex;align-items:center;justify-content:center;gap:8px;font-size:13.5px;color:var(--muted);margin-top:2px}
  .remember input{width:16px;height:16px;accent-color:var(--coral)}
  .err{font-size:14px;color:var(--coralDeep);font-weight:600;min-height:20px;margin-top:2px}
  .foot{margin-top:24px;padding-top:18px;border-top:1px solid var(--line);font-size:12px;color:var(--muted);line-height:1.6}
  .foot a{color:var(--coralDeep);text-decoration:none}
  /* ---- App (ferramenta) ---- */
  #app{position:fixed;inset:0;display:none;background:var(--bg)}
  #app iframe{width:100%;height:100%;border:0;display:block}
  .booting{opacity:.55;pointer-events:none}
</style>
</head>
<body>
  <main id="gate">
    <div class="card" id="gateCard">
      <div class="lock" aria-hidden="true">
        <svg viewBox="0 0 24 24"><rect x="4.5" y="10.5" width="15" height="10" rx="2.2"></rect><path d="M8 10.5V7.5a4 4 0 0 1 8 0v3"></path><circle cx="12" cy="15" r="1.4" fill="currentColor" stroke="none"></circle></svg>
      </div>
      <div class="eyebrow">Ferramenta interativa</div>
      <h1>Classificador de PA</h1>
      <p class="sub">Diretriz Brasileira de Hipertensão Arterial 2025. Informe o código de acesso.</p>
      <form id="gateForm" autocomplete="off">
        <input id="code" type="password" inputmode="text" autocapitalize="none" autocomplete="off"
               placeholder="Código de acesso" aria-label="Código de acesso">
        <button id="btn" type="submit">Acessar</button>
        <label class="remember"><input id="remember" type="checkbox" checked> Manter conectado neste aparelho</label>
        <div class="err" id="err" role="alert"></div>
      </form>
      <div class="foot">
        Sem acesso? Solicite à <strong>Dra.&nbsp;Thaís&nbsp;Giunco&nbsp;Alexandre</strong><br>
        <a href="mailto:thaismed34@gmail.com?subject=Código%20de%20acesso%20à%20ferramenta">thaismed34@gmail.com</a>
      </div>
    </div>
  </main>

  <div id="app" aria-hidden="true"></div>

  var ITER = 200000, STORE = "hpa_code_v1";

  var gate = document.getElementById("gate");
  var app  = document.getElementById("app");
  var form = document.getElementById("gateForm");
  var codeEl = document.getElementById("code");
  var btn = document.getElementById("btn");
  var errEl = document.getElementById("err");
  var rememberEl = document.getElementById("remember");
  var gateCard = document.getElementById("gateCard");

  function b64ToBytes(b64){
    var bin = atob(b64), u = new Uint8Array(bin.length);
    for (var i=0;i<bin.length;i++) u[i]=bin.charCodeAt(i);
    return u;
  }
  async function deriveKey(pass, salt){
    var enc = new TextEncoder();
    var km = await crypto.subtle.importKey("raw", enc.encode(pass), "PBKDF2", false, ["deriveKey"]);
    return crypto.subtle.deriveKey(
      { name:"PBKDF2", salt:salt, iterations:ITER, hash:"SHA-256" },
      km, { name:"AES-GCM", length:256 }, false, ["decrypt"]
    );
  }
  async function decrypt(pass){
    var data = b64ToBytes(PAYLOAD);
    var salt = data.slice(0,16), iv = data.slice(16,28), ct = data.slice(28);
    var key = await deriveKey(pass, salt);
    var buf = await crypto.subtle.decrypt({ name:"AES-GCM", iv:iv }, key, ct);
    return new TextDecoder().decode(buf);
  }
  function render(html){
    var f = document.createElement("iframe");
    f.setAttribute("title", "Classificador de PA");
    app.appendChild(f);
    f.srcdoc = html;
    gate.style.display = "none";
    app.style.display = "block";
    app.setAttribute("aria-hidden","false");
    document.title = "Classificador de PA · Diretriz 2025";
  }
  async function attempt(pass, fromStore){
    try{
      var html = await decrypt(pass);
      if (rememberEl.checked || fromStore){ try{ localStorage.setItem(STORE, pass); }catch(e){} }
      render(html);
      return true;
    }catch(e){
      if (fromStore){ try{ localStorage.removeItem(STORE); }catch(_){} }
      return false;
    }
  }

  form.addEventListener("submit", async function(ev){
    ev.preventDefault();
    errEl.textContent = "";
    var pass = codeEl.value.trim();
    if (!pass){ return; }
    btn.disabled = true; gateCard.classList.add("booting"); btn.textContent = "Verificando…";
    var ok = await attempt(pass, false);
    if (!ok){
      btn.disabled = false; gateCard.classList.remove("booting"); btn.textContent = "Acessar";
      errEl.textContent = "Código incorreto.";
      codeEl.value = ""; codeEl.focus();
    }
  });

  // Auto acesso neste aparelho (se já validado antes)
  (async function(){
    var saved = null;
    try{ saved = localStorage.getItem(STORE); }catch(e){}
    if (saved){ await attempt(saved, true); }
    if (app.style.display !== "block"){ codeEl.focus(); }
  })();

  // Registro do service worker (offline)
  if ("serviceWorker" in navigator){
    window.addEventListener("load", function(){
      navigator.serviceWorker.register("sw.js").catch(function(){});
    });
  }
})();
